{% set name = "album-docker" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/album_docker-{{ version }}.tar.gz
  sha256: a3fa18a4be1b4844e2ebd234377f76005d7c65a8a099ac26f07de5d0d5bacca8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - docker=album.docker_plugin.argument_parsing:create_docker_parser

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=42
  run:
    - python >={{ python_min }}
    - album >=0.12.0,<0.13.0
    - docker-py

test:
  imports:
    - album
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://album.solutions
  summary: album plugin for building docker images from solutions
  dev_url: https://gitlab.com/album-app/plugins/album-docker
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jpalbrecht
